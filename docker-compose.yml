services:
  app:
    build: .
    env_file:
      - .env.docker
    container_name: my_app
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    container_name: my_redis
    ports:
      - "6379:6379"
  postgres:
    image: postgres:18
    container_name : my_postgres
    env_file:
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: